name: Flask CI/CD Pipeline

on:
  push:
    branches: [ main, staging ]
  release:
    types: [ published ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # Real MongoDB, available at localhost:27017 during the job
    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    env:
      MONGO_URI: mongodb://localhost:27017/test_student_db
      SECRET_KEY: ci-secret-key

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flask flask-pymongo python-dotenv pymongo certifi pytest

      - name: Run tests with pytest
        run: pytest test_smoke.py -v

      - name: Build (prepare for deployment)
        run: echo "Build complete. Application ready for deployment."

  deploy-staging:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/staging'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Staging
        env:
          STAGING_API_TOKEN: ${{ secrets.STAGING_API_TOKEN }}
        run: |
          echo "Deploying to STAGING environment..."
          echo "Staging deployment complete."

  deploy-production:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy to Production
        env:
          PROD_API_TOKEN: ${{ secrets.PROD_API_TOKEN }}
        run: |
          echo "Deploying to PRODUCTION environment..."
          echo "Production deployment complete."
